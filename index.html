<html lang="ko">
<head>
<meta charset="UTF-8">

<title>캠핏 거래처 관리 대시보드 - 박해준 MD</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--accent:#3b82f6;--accent2:#8b5cf6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--text:#f1f5f9;--text2:#94a3b8;--border:#475569}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a5f,#2d1b69);padding:24px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.header h1{font-size:22px;font-weight:700}
.header .sub{color:var(--text2);font-size:13px;margin-top:4px}
.header .badge{background:var(--accent);padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600}
.nav{display:flex;gap:4px;padding:12px 32px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.nav button{padding:10px 20px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;font-size:14px;font-weight:500;white-space:nowrap;transition:all .2s}
.nav button.active{background:var(--accent);color:#fff}
.nav button:hover:not(.active){background:var(--card2)}
.content{padding:24px 32px;max-width:1600px;margin:0 auto}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border)}
.kpi .label{font-size:12px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.kpi .value{font-size:28px;font-weight:700}
.kpi .change{font-size:12px;margin-top:6px;display:flex;align-items:center;gap:4px}
.up{color:var(--green)}
.down{color:var(--red)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:1024px){.grid2,.grid3{grid-template-columns:1fr}}
.panel{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:16px}
.panel h3{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.panel h3 .icon{width:8px;height:8px;border-radius:50%;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:var(--card2);color:var(--text2);font-weight:600;position:sticky;top:0;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover td{background:rgba(59,130,246,.08)}
.scroll-table{max-height:500px;overflow-y:auto;border-radius:8px;border:1px solid var(--border)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-green{background:rgba(16,185,129,.15);color:var(--green)}
.tag-red{background:rgba(239,68,68,.15);color:var(--red)}
.tag-orange{background:rgba(245,158,11,.15);color:var(--orange)}
.tag-blue{background:rgba(59,130,246,.15);color:var(--accent)}
.tag-purple{background:rgba(139,92,246,.15);color:var(--accent2)}
.search{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:8px;width:300px;font-size:14px}
.search:focus{outline:none;border-color:var(--accent)}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-green{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.chart-wrap{position:relative;height:300px}
.msg-box{background:var(--card2);border-radius:8px;padding:16px;margin-top:12px;border:1px solid var(--border)}
.msg-box textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px;resize:vertical;min-height:80px;font-family:inherit;font-size:13px}
.filter-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
select{background:var(--card2);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:8px;font-size:13px}
select:focus{outline:none;border-color:var(--accent)}
.pct{font-size:11px;color:var(--text2)}
canvas{border-radius:8px}
.camp-link{color:var(--accent);text-decoration:none}
.camp-link:hover{text-decoration:underline}
.msg-template{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px 0;font-size:13px;line-height:1.6}
.alert-card{background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(239,68,68,.05));border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:16px;margin-bottom:12px}
.btn-del{background:transparent;color:var(--red);border:1px solid rgba(239,68,68,.3);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;transition:all .2s}
.btn-del:hover{background:rgba(239,68,68,.15)}
.btn-restore{background:transparent;color:var(--orange);border:1px solid rgba(245,158,11,.3);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px}
.btn-restore:hover{background:rgba(245,158,11,.15)}
.hidden-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;font-size:13px}
.ov-filter{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.ov-filter select{min-width:100px}
.rs-table td,.rs-table th{text-align:right}
.rs-table td:first-child,.rs-table th:first-child{text-align:left}
th.sortable{cursor:pointer;user-select:none;position:relative;padding-right:22px}
th.sortable:hover{color:var(--accent)}
th.sortable .sort-arrows{position:absolute;right:4px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;line-height:1;font-size:8px;color:var(--border)}
th.sortable.asc .sort-arrows .arr-up,th.sortable.desc .sort-arrows .arr-down{color:var(--accent)}
th.sortable .arr-up,th.sortable .arr-down{display:block}
</style>
</head>

const sortState={}; // tableId -> {col, dir}
function makeSortable(tableId, data, renderRowFn, defaultCol, defaultDir='desc'){
  if(!sortState[tableId])sortState[tableId]={col:defaultCol,dir:defaultDir};
  const st=sortState[tableId];
  const table=document.getElementById(tableId);
  if(!table)return;
  const ths=table.querySelectorAll('thead th');
  ths.forEach((th,i)=>{
    const key=th.dataset.sort;
    if(!key)return;
    th.classList.add('sortable');
    th.classList.remove('asc','desc');
    if(key===st.col)th.classList.add(st.dir);
    if(!th.querySelector('.sort-arrows')){
      th.innerHTML+=`<span class="sort-arrows"><span class="arr-up">▲</span><span class="arr-down">▼</span></span>`;
    }
    th.onclick=()=>{
      if(st.col===key)st.dir=st.dir==='desc'?'asc':'desc';
      else{st.col=key;st.dir='desc';}
      applySortAndRender(tableId,data,renderRowFn);
    };
  });
  applySortAndRender(tableId,data,renderRowFn);
}
function applySortAndRender(tableId,data,renderRowFn){
  const st=sortState[tableId];
  const sorted=[...data].sort((a,b)=>{
    let va=a[st.col],vb=b[st.col];
    if(va==null)va=st.dir==='asc'?Infinity:-Infinity;
    if(vb==null)vb=st.dir==='asc'?Infinity:-Infinity;
    if(typeof va==='string')return st.dir==='asc'?va.localeCompare(vb,'ko'):vb.localeCompare(va,'ko');
    return st.dir==='asc'?va-vb:vb-va;
  });
  const table=document.getElementById(tableId);
  if(!table)return;
  const ths=table.querySelectorAll('thead th');
  ths.forEach(th=>{
    th.classList.remove('asc','desc');
    if(th.dataset.sort===st.col)th.classList.add(st.dir);
  });
  table.querySelector('tbody').innerHTML=sorted.map(renderRowFn).join('');
}

function getAvailMonths(year){
  const s=new Set();
  activeMonthly().filter(r=>r.y===year).forEach(r=>s.add(r.m));
  return [...s].sort((a,b)=>a-b);
}
// 동일 기간 비교용: 월별 데이터를 캠핑장별로 집계
function aggByPeriod(year,months){
  const m=activeMonthly().filter(r=>r.y===year&&months.includes(r.m));
  const map={};
  m.forEach(r=>{
    if(!map[r.n])map[r.n]={n:r.n,pay:0,cnt:0,ref:0,set:0,bf:0,pf:0,pg:0,ptn:0,fmd:0,rmd:0,hmd:0};
    const o=map[r.n];o.pay+=r.pay;o.cnt+=r.cnt;o.ref+=r.ref;o.set+=r.set;
    o.bf+=r.bf;o.pf+=r.pf;o.pg+=r.pg;o.ptn+=r.ptn;o.fmd+=r.fmd;o.rmd+=r.rmd;o.hmd+=r.hmd;
  });
  return map;
}
function getYoYData(cy,py){
  // 동일 기간 비교: cy에 존재하는 월만 py에서도 비교
  const curMonths=getAvailMonths(cy);
  const curMap=aggByPeriod(cy,curMonths);
  const prevMap=aggByPeriod(py,curMonths);
  const res=[];
  Object.values(curMap).forEach(r=>{
    const p=prevMap[r.n];
    const md=r.fmd+r.rmd+r.hmd, pmd=p?(p.fmd+p.rmd+p.hmd):0;
    res.push({name:r.n,curPay:r.pay,curCnt:r.cnt,curSet:r.set,prevPay:p?p.pay:0,prevCnt:p?p.cnt:0,prevSet:p?p.set:0,
      payChg:p?pctNum(r.pay,p.pay):null,cntChg:p?pctNum(r.cnt,p.cnt):null,
      mdFee:md,prevMdFee:pmd,camp:campMap[r.n]||null});
  });
  Object.values(prevMap).forEach(r=>{
    if(!curMap[r.n]){
      res.push({name:r.n,curPay:0,curCnt:0,curSet:0,prevPay:r.pay,prevCnt:r.cnt,prevSet:r.set,
        payChg:-100,cntChg:-100,mdFee:0,prevMdFee:r.fmd+r.rmd+r.hmd,camp:campMap[r.n]||null});
    }
  });
  // 비교 기간 정보 저장
  res._period=curMonths;
  return res;
}

function getMoMData(year,month){
  const cur=monthlyBycamp(year,month),prev=monthlyBycamp(year-1,month),pm={};
  prev.forEach(r=>{pm[r.n]=r});
  const res=[];
  cur.forEach(r=>{
    const p=pm[r.n];
    res.push({name:r.n,curPay:r.pay,curCnt:r.cnt,prevPay:p?p.pay:0,prevCnt:p?p.cnt:0,
      payChg:p?pctNum(r.pay,p.pay):null,mdFee:r.fmd+r.rmd+r.hmd,camp:campMap[r.n]||null});
  });
  return res;
}

Chart.defaults.color='#94a3b8';
Chart.defaults.borderColor='#334155';

function renderOverviewCharts(){
  const agg={};
  activeMonthly().filter(r=>r.y>=2024).forEach(r=>{
    const k=r.y+'-'+(r.m<10?'0'+r.m:r.m);
    if(!agg[k])agg[k]={pay:0,md:0};
    agg[k].pay+=r.pay;agg[k].md+=r.fmd+r.rmd+r.hmd;
  });
  const keys=Object.keys(agg).sort();
  charts.ch1=new Chart(document.getElementById('ch1'),{type:'bar',data:{labels:keys,datasets:[{label:'결제금액',data:keys.map(k=>agg[k].pay),backgroundColor:'rgba(59,130,246,.6)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>fmt(v)}}}}});
  charts.ch2=new Chart(document.getElementById('ch2'),{type:'line',data:{labels:keys,datasets:[{label:'MD수수료(RS)',data:keys.map(k=>agg[k].md),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)',fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>fmt(v)}}}}});
  const camps=activeCamps();
  const pc={};camps.forEach(c=>{const p=c.p||'미설정';pc[p]=(pc[p]||0)+1});
  const pk=Object.keys(pc).sort((a,b)=>pc[b]-pc[a]).slice(0,10);
  charts.ch3=new Chart(document.getElementById('ch3'),{type:'doughnut',data:{labels:pk,datasets:[{data:pk.map(k=>pc[k]),backgroundColor:['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899','#84cc16','#f97316','#6366f1']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}}}});
  renderOvRS();
}

// 종합현황 매출/RS 필터 테이블
window.renderOvRS=function(){
  const year=+document.getElementById('ovYear').value;
  const monthVal=document.getElementById('ovMonth').value;
  const search=(document.getElementById('ovSearch').value||'').toLowerCase();
  let rows;
  if(monthVal==='all'){
    // 연간 누적: yearly 데이터 사용
    rows=activeYearly().filter(r=>r.y===year);
    rows=rows.map(r=>({n:r.n,pay:r.pay,cnt:r.cnt,ref:r.ref,bf:r.bf,pf:r.pf,pg:r.pg,ptn:r.ptn,md:r.fmd+r.rmd+r.hmd,set:r.set}));
  }else{
    const month=+monthVal;
    const md=activeMonthly().filter(r=>r.y===year&&r.m===month);
    rows=md.map(r=>({n:r.n,pay:r.pay,cnt:r.cnt,ref:r.ref,bf:r.bf,pf:r.pf,pg:r.pg,ptn:r.ptn,md:r.fmd+r.rmd+r.hmd,set:r.set}));
  }
  if(search)rows=rows.filter(r=>r.n.toLowerCase().includes(search));
  const tPay=rows.reduce((s,r)=>s+r.pay,0);
  const tMd=rows.reduce((s,r)=>s+r.md,0);
  const tCnt=rows.reduce((s,r)=>s+r.cnt,0);
  const tSet=rows.reduce((s,r)=>s+r.set,0);

    <div class="kpi"><div class="label">${label} 결제금액</div><div class="value">${fmt(tPay)}</div></div>
    <div class="kpi"><div class="label">${label} RS 수수료</div><div class="value" style="color:var(--green)">${fmt(tMd)}</div></div>

    <div class="kpi"><div class="label">${label} 정산금액</div><div class="value">${fmt(tSet)}</div></div>`;

};

function renderYoY(){

  if(pNote){

  }
  if(search)data=data.filter(r=>r.name.toLowerCase().includes(search));
  data.forEach(r=>{const c=r.camp||{};r.status=c.s||'';r.plan=c.p||''});
  const up=data.filter(r=>r.payChg!==null&&r.payChg>0).length;
  const dn=data.filter(r=>r.payChg!==null&&r.payChg<0).length;
  const nw=data.filter(r=>r.prevPay===0&&r.curPay>0).length;
  const lost=data.filter(r=>r.curPay===0&&r.prevPay>0).length;
  document.getElementById('yoyKpi').innerHTML=`
    <div class="kpi"><div class="label">매출 상승</div><div class="value up">${up}개</div></div>
    <div class="kpi"><div class="label">매출 감소</div><div class="value down">${dn}개</div></div>
    <div class="kpi"><div class="label">신규 거래</div><div class="value" style="color:var(--accent)">${nw}개</div></div>
    <div class="kpi"><div class="label">거래 이탈</div><div class="value" style="color:var(--orange)">${lost}개</div></div>`;
  const yoyRowFn=r=>{
    const chg=r.payChg,camp=r.camp||{};
    const tag=chg===null?'<span class="tag tag-blue">신규</span>':chg>0?`<span class="tag tag-green">▲${chg.toFixed(1)}%</span>`:`<span class="tag tag-red">▼${Math.abs(chg).toFixed(1)}%</span>`;
    return `<tr><td>${r.name}</td><td><span class="tag ${camp.s==='운영중'?'tag-green':'tag-orange'}">${camp.s||'-'}</span></td><td>${camp.p||'-'}</td><td>${fmt(r.prevPay)}</td><td>${fmt(r.curPay)}</td><td>${tag}</td><td>${fmtN(r.prevCnt)}</td><td>${fmtN(r.curCnt)}</td><td>${fmt(r.mdFee)}</td></tr>`;
  };
  makeSortable('yoyTable',data,yoyRowFn,'payChg','desc');

  const bins={'<-50':0,'-50~-30':0,'-30~-10':0,'-10~0':0,'0~10':0,'10~30':0,'30~50':0,'>50':0};
  chgD.forEach(v=>{if(v<-50)bins['<-50']++;else if(v<-30)bins['-50~-30']++;else if(v<-10)bins['-30~-10']++;else if(v<0)bins['-10~0']++;else if(v<10)bins['0~10']++;else if(v<30)bins['10~30']++;else if(v<50)bins['30~50']++;else bins['>50']++});
  if(charts.yoyCh1)charts.yoyCh1.destroy();
  charts.yoyCh1=new Chart(document.getElementById('yoyCh1'),{type:'bar',data:{labels:Object.keys(bins),datasets:[{data:Object.values(bins),backgroundColor:['#ef4444','#f87171','#fca5a5','#fecaca','#bbf7d0','#86efac','#4ade80','#22c55e']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:'업체 수'}}}}});
  if(charts.yoyCh2)charts.yoyCh2.destroy();
  const sc=data.filter(r=>r.prevPay>0).map(r=>({x:r.prevPay,y:r.curPay,name:r.name}));
  charts.yoyCh2=new Chart(document.getElementById('yoyCh2'),{type:'scatter',data:{datasets:[{data:sc,backgroundColor:'rgba(59,130,246,.5)',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw.name+': '+fmt(ctx.raw.x)+' → '+fmt(ctx.raw.y)}}},scales:{x:{title:{display:true,text:py+'년'},ticks:{callback:v=>fmt(v)}},y:{title:{display:true,text:cy+'년'},ticks:{callback:v=>fmt(v)}}}}});
}

function renderDecline(){

      <p style="margin-top:8px;font-size:13px"><strong>대응:</strong> 카카오톡/문자 안부 → 경쟁 OTA 가격 확인 → 캠핏 프로모션 안내</p></div>

}

    targets=getYoYData(2026,2025).filter(r=>r.payChg!==null&&r.payChg<-10).sort((a,b)=>a.payChg-b.payChg).slice(0,20);

    }else if(type==='growth'){
      msg=F?`안녕하세요, ${r.name} 대표님.\n캠핏 담당 MD 박해준입니다.\n\n${r.name}의 올해 실적이 매우 좋은 흐름을 보이고 있어 감사 인사를 드립니다.\n\n앞으로도 더 좋은 성과를 이어가실 수 있도록 적극 지원하겠습니다.\n추가로 필요하신 부분이 있으시면 언제든 말씀해 주세요.\n\n감사합니다.\n캠핏 박해준 드림`

    }else if(type==='inactive'){
      msg=F?`안녕하세요, ${r.name} 대표님.\n캠핏 담당 MD 박해준입니다.\n\n최근 캠핏에서의 예약 현황이 확인되지 않아 연락드립니다.\n혹시 운영 관련하여 어려운 점이 있으시거나 문의사항이 있으시면 편하게 말씀해 주세요.\n\n시즌 맞이 특별 프로모션 참여 기회도 안내해 드릴 수 있습니다.\n\n감사합니다.\n캠핏 박해준 드림`

window.copyMsg=function(btn){
  const t=btn.closest('.msg-box').querySelector('.msg-template');
  navigator.clipboard.writeText(t.innerText).then(()=>{btn.textContent='복사됨!';setTimeout(()=>btn.textContent='복사',1500)});
};
window.copyAllMsg=function(){
  const all=document.querySelectorAll('.msg-template');
  const t=Array.from(all).map((el,i)=>`[${i+1}] `+el.innerText).join('\n\n---\n\n');
  navigator.clipboard.writeText(t).then(()=>alert('전체 메시지가 복사되었습니다.'));
};

function renderMarketCharts(){
  const mkt=D.mkt_m.sort((a,b)=>a.y===b.y?a.m-b.m:a.y-b.y);
  const labels=mkt.map(r=>r.y+'/'+r.m);
  const myAgg={};D.monthly.forEach(r=>{const k=r.y+'/'+r.m;myAgg[k]=(myAgg[k]||0)+r.pay});
  charts.mktCh1=new Chart(document.getElementById('mktCh1'),{type:'bar',data:{labels,datasets:[{label:'전체 시장',data:mkt.map(r=>r.pay),backgroundColor:'rgba(59,130,246,.3)',borderRadius:4},{label:'내 거래처',data:labels.map(k=>myAgg[k]||0),backgroundColor:'rgba(16,185,129,.6)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{ticks:{callback:v=>fmt(v)}}}}});
  const share=labels.map((k,i)=>{const t=mkt[i].pay,m=myAgg[k]||0;return t>0?(m/t*100):0});
  charts.mktCh2=new Chart(document.getElementById('mktCh2'),{type:'line',data:{labels,datasets:[{label:'점유율(%)',data:share,borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,.1)',fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{ticks:{callback:v=>v.toFixed(1)+'%'}}}}});
  const md=D.md.slice(0,10);
  charts.mktCh3=new Chart(document.getElementById('mktCh3'),{type:'bar',data:{labels:md.map(r=>r[0]),datasets:[{data:md.map(r=>r[1]),backgroundColor:md.map((_,i)=>i===0?'#3b82f6':'rgba(59,130,246,.3)'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}}}});
  const myYA={},myCntA={};
  D.yearly.forEach(r=>{myYA[r.y]=(myYA[r.y]||0)+r.pay;myCntA[r.y]=(myCntA[r.y]||0)+r.cnt});
  document.getElementById('mktYearlyBody').innerHTML=D.mkt_y.sort((a,b)=>b.y-a.y).map(r=>{
    const my=myYA[r.y]||0,mc=myCntA[r.y]||0,sh=r.pay>0?(my/r.pay*100).toFixed(1)+'%':'N/A';
    return `<tr><td>${r.y}</td><td>${fmt(r.pay)}</td><td>${fmtN(r.cnt)}</td><td>${fmt(my)}</td><td>${fmtN(mc)}</td><td><strong>${sh}</strong></td></tr>`;
  }).join('');
}

// === 마케팅 타겟 분석 ===
function renderMktTarget(){
  const targets=(RAW.mktTargets||[]).map((r,i)=>({...r,rank:i+1}));
  // KPI
  const avgChg=targets.length?(targets.reduce((s,r)=>s+r.chg,0)/targets.length).toFixed(1):'0';
  const avgAnnual=targets.length?Math.round(targets.reduce((s,r)=>s+r.annual,0)/targets.length):0;
  const potentialRevenue=targets.slice(0,15).length*25; // 15개×25만=월375만
  document.getElementById('mktKpi').innerHTML=`
    <div class="kpi"><div class="label">추천 후보</div><div class="value">${targets.length}개</div></div>
    <div class="kpi"><div class="label">평균 매출 감소율</div><div class="value down">${avgChg}%</div></div>
    <div class="kpi"><div class="label">평균 연환산 매출</div><div class="value">${fmt(avgAnnual)}</div></div>
    <div class="kpi"><div class="label">예상 월 구독 수익 (15개)</div><div class="value" style="color:var(--green)">${potentialRevenue}만원</div></div>`;

  // Generate reason for each
  function genReason(r){
    const parts=[];
    if(r.chg<=-70)parts.push('매출 급감('+r.chg+'%)으로 마케팅 니즈 절실');
    else if(r.chg<=-50)parts.push('매출 큰폭 하락('+r.chg+'%)으로 개선 의지 높을 것');
    else parts.push('매출 감소세('+r.chg+'%)로 마케팅 필요성 인식 가능');

    // 실제 사진 분석 기반
    if(r.photoNote)parts.push('[사진] '+r.photoNote);
    if(r.mainType&&r.mainType!=='미확인'){
      if(r.photoScore<=1)parts.push('메인 사진: '+r.mainType+' → 실사 교체 시급');
      else if(r.photoScore<=2&&!r.hasDrone)parts.push('메인: '+r.mainType+', 드론 없음 → 항공 전경샷 효과 클 것');
    }

    if(r.exposure>=200000&&r.conv<1.5)parts.push('노출 '+fmt(r.exposure)+'회/전환 '+r.conv+'% → 사진 개선 시 전환율 제고 가능');
    else if(r.exposure>=100000)parts.push('노출 '+fmt(r.exposure)+'회 잠재력');

    if(r.favs>=2000)parts.push('찜 '+fmtN(r.favs)+'건 관심도 높음');

    if(r.sites>=30)parts.push(r.sites+'개 사이트 → 드론 전경 효과 극대');

    if(r.plan.includes('파트너')||r.plan.includes('실드')||r.plan.includes('케어'))parts.push('유료 플랜 사용 → 투자 의지 확인');

    return parts.slice(0,5).join('. ')+'.';
  }

  const mktRowFn=r=>{
    const reason=genReason(r);
    const chgTag=`<span class="tag tag-red">▼${Math.abs(r.chg)}%</span>`;
    const scoreBar=`<div style="display:flex;align-items:center;gap:4px"><div style="width:50px;height:6px;background:var(--card2);border-radius:3px;overflow:hidden"><div style="width:${Math.round(r.score*100)}%;height:100%;background:${r.score>=0.8?'var(--green)':r.score>=0.7?'var(--accent)':'var(--orange)'};border-radius:3px"></div></div><span style="font-size:11px">${(r.score*100).toFixed(0)}</span></div>`;
    const convTag=r.conv<1?`<span class="tag tag-red">${r.conv}%</span>`:r.conv<1.5?`<span class="tag tag-orange">${r.conv}%</span>`:`<span class="tag tag-green">${r.conv}%</span>`;
    const photoTag=r.photoScore<=1?`<span class="tag tag-red">${r.photoNeed}</span><br><span style="font-size:10px;color:var(--text2)">${r.mainType||''}</span>`:r.photoScore<=2?`<span class="tag tag-orange">${r.photoNeed}</span><br><span style="font-size:10px;color:var(--text2)">${r.mainType||''}</span>`:r.photoScore<=3?`<span class="tag tag-blue">${r.photoNeed}</span>`:`<span class="tag tag-green">${r.photoNeed}</span>`;
    const linkBtn=r.link?`<a href="${r.link}" target="_blank" class="camp-link" style="font-size:11px">${r.n}</a>`:`<strong>${r.n}</strong>`;
    return `<tr>
      <td><strong>${r.rank}</strong></td>
      <td>${linkBtn}</td>
      <td>${r.region}</td>
      <td>${r.sites}</td>
      <td>${fmt(r.pay25)}</td>
      <td>${fmt(r.pay26)}</td>
      <td>${chgTag}</td>
      <td>${fmt(r.annual)}</td>
      <td>${fmtN(r.exposure)}</td>
      <td>${fmtN(r.favs)}</td>
      <td><span class="tag tag-purple">${r.plan.length>12?r.plan.substring(0,12)+'…':r.plan}</span></td>
      <td>${convTag}</td>
      <td>${photoTag}</td>
      <td>${scoreBar}</td>
      <td style="white-space:normal;max-width:350px;font-size:12px;color:var(--text2);line-height:1.5">${reason}</td>
    </tr>`;
  };
  makeSortable('mktTable',targets,mktRowFn,'score','desc');

  // Strategy summary
  const tier1=targets.filter(r=>r.score>=0.75);
  const tier2=targets.filter(r=>r.score>=0.7&&r.score<0.75);
  const gyeonggi=targets.filter(r=>r.region.includes('경기'));
  const gangwon=targets.filter(r=>r.region.includes('강원'));
  const chungnam=targets.filter(r=>r.region.includes('충남')||r.region.includes('충북'));
  document.getElementById('mktStrategyBody').innerHTML=`
    <div class="grid2">
      <div>
        <h4 style="margin-bottom:12px;font-size:14px">서비스 구성 제안</h4>
        <div style="font-size:13px;color:var(--text2);line-height:1.8">
          <p><strong style="color:var(--text)">베이직 (월 20만원)</strong></p>
          <ul style="padding-left:20px;margin-bottom:12px">
            <li>월간 리포트: 리뷰 분석, 조회수/노출 트렌드, 예약 패턴</li>
            <li>캠핏 데이터 기반 경쟁 분석 인사이트</li>
            <li>비수기 프로모션 기획안 제안</li>
          </ul>
          <p><strong style="color:var(--text)">프리미엄 (월 30만원)</strong></p>
          <ul style="padding-left:20px;margin-bottom:12px">
            <li>베이직 전체 포함</li>
            <li>연 1회 드론 항공 촬영 (봄 or 가을)</li>
            <li>촬영 소재 → 캠핏 프로필/썸네일 최적화</li>
            <li>월 1회 전략 미팅 (15분, 전화)</li>
          </ul>
        </div>
      </div>
      <div>
        <h4 style="margin-bottom:12px;font-size:14px">영업 우선순위</h4>
        <div style="font-size:13px;color:var(--text2);line-height:1.8">
          <p><span class="tag tag-green">1순위 (스코어 75+): ${tier1.length}개</span> — 매출 감소폭 크고 노출 잠재력 높아 가장 설득 용이</p>
          <p style="margin-top:8px"><span class="tag tag-blue">2순위 (스코어 70~75): ${tier2.length}개</span> — 1순위 확보 후 순차 접근</p>
          <p style="margin-top:16px"><strong style="color:var(--text)">지역별 분포</strong></p>
          <ul style="padding-left:20px">
            <li>경기: ${gyeonggi.length}개 — 드론 촬영 이동비 최소</li>
            <li>강원: ${gangwon.length}개 — 자연 경관 드론샷 효과 극대</li>
            <li>충청: ${chungnam.length}개 — 접근성 양호</li>
          </ul>
          <p style="margin-top:16px"><strong style="color:var(--text)">수익 시뮬레이션</strong></p>
          <ul style="padding-left:20px">
            <li>10개 × 25만 = <strong>월 250만원</strong></li>
            <li>15개 × 25만 = <strong>월 375만원</strong></li>
            <li>드론 촬영 애드온(건당 30만) 추가 수익 가능</li>
          </ul>
        </div>
      </div>
    </div>`;
}

function initReportGen(){
  document.addEventListener('click',function(e){
    const ac=document.getElementById('rgAC');
    if(ac&&!e.target.closest('#rgCamp')&&!e.target.closest('#rgAC'))ac.style.display='none';
  });
}
const _rgNames=(function(){try{return[...new Set(D.monthly.map(r=>r.n))].sort((a,b)=>a.localeCompare(b,'ko'))}catch(e){return[]}})();
window.rgAutoComplete=function(){
  const input=document.getElementById('rgCamp');
  const ac=document.getElementById('rgAC');
  const q=input.value.trim().toLowerCase();
  if(!q){ac.style.display='none';return;}
  const matches=_rgNames.filter(n=>n.toLowerCase().includes(q)).slice(0,15);
  if(!matches.length){ac.style.display='none';return;}
  ac.innerHTML=matches.map(n=>`<div style="padding:8px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);color:var(--text)" onmouseover="this.style.background='var(--card2)'" onmouseout="this.style.background=''" onclick="document.getElementById('rgCamp').value='${n.replace(/'/g,"\\'")}';document.getElementById('rgAC').style.display='none'">${n}</div>`).join('');
  ac.style.display='block';
};

// 리포트 데이터 수집
function collectCampData(name){
  const camp=campMap[name]||{};
  const m26=D.monthly.filter(r=>r.n===name&&r.y===2026&&[1,2,3].includes(r.m));
  const m25=D.monthly.filter(r=>r.n===name&&r.y===2025&&[1,2,3].includes(r.m));
  const pay26=m26.reduce((s,r)=>s+r.pay,0);
  const pay25=m25.reduce((s,r)=>s+r.pay,0);
  const chg=pay25>0?Math.round((pay26-pay25)/pay25*1000)/10:0;
  const sites=camp.z||0;
  const ps=camp.rv||0; // reuse rv field or estimate
  const photoScore=3; // default
  return {
    n:name, region:(camp.a||'').split(' ').slice(0,2).join(' '),
    sites, pay25, pay26, chg, annual:pay26*4,
    plan:camp.p||'', link:camp.l||'',
    btype:camp.zt||'',
    photoScore, hasDrone:false, mainType:'미확인',
    photoIssues:[], photoNote:'',
  };
}

// Claude API 호출
// === 스마트 분석 엔진 (조건 분기 기반) ===
function smartRound(c,roundNum){
  const f=n=>{if(Math.abs(n)>=1e8)return(n/1e8).toFixed(1)+'억';if(Math.abs(n)>=1e4)return(n/1e4).toFixed(0)+'만';return n.toLocaleString()};
  const up=c.chg>0, m26=Math.round(c.pay26/3), m25=Math.round(c.pay25/3), sites=c.sites;
  const eff=sites>0?Math.round(c.pay26/sites):0, pm=sites>0?Math.round(c.annual/sites/12):0;
  const bt=c.btype||'', region=c.region, plan=c.plan||'';
  // 규모 분류
  const scale=sites>=40?'대형':(sites>=20?'중형':'소형');
  // 매출 심각도
  const severity=up?'성장':(c.chg>-20?'소폭하락':(c.chg>-40?'하락':(c.chg>-60?'급락':'폭락')));
  // 컨셉 추출
  const concepts=[];
  if(bt.includes('애견')||bt.includes('반려'))concepts.push('애견 전용');
  if(bt.includes('키즈')||bt.includes('가족'))concepts.push('키즈/가족');
  if(bt.includes('글램'))concepts.push('글램핑');
  if(bt.includes('카라반'))concepts.push('카라반');
  if(bt.includes('펜션'))concepts.push('펜션');
  if(bt.includes('노키즈'))concepts.push('노키즈');
  if(region.includes('태안')||region.includes('안산'))concepts.push('바다');
  if(bt.includes('계곡')||region.includes('홍천')||region.includes('영월')||region.includes('평창'))concepts.push('계곡/자연');
  const hasConcept=concepts.length>0;
  // 월별 추이
  const months=D.monthly.filter(r=>r.n===c.n).sort((a,b)=>a.y===b.y?a.m-b.m:a.y-b.y);
  const recent6=months.slice(-6);
  const trend=recent6.length>=3?(recent6[recent6.length-1].pay>recent6[recent6.length-3].pay?'상승':'하락'):'데이터부족';
  // 성수기/비수기 패턴
  const summerPay=months.filter(r=>r.y===2025&&[6,7,8,9].includes(r.m)).reduce((s,r)=>s+r.pay,0);
  const winterPay=months.filter(r=>r.y===2025&&[11,12,1,2].includes(r.m)).reduce((s,r)=>s+r.pay,0);
  const seasonal=summerPay>0&&winterPay>0?Math.round(summerPay/winterPay*10)/10:0;
  const msgs=[];

  if(roundNum===1){
    // R1: 매출 현황 — 규모별·심각도별 분기
    if(up){
      msgs.push({bot:'datapine',text:`<strong>${c.n}</strong> 매출이 성장하고 있습니다.<br>• 25년 1Q ${f(c.pay25)}원 → 26년 1Q ${f(c.pay26)}원 (<strong style="color:#4caf50">${c.chg>0?'+':''}${c.chg}%</strong>)<br>• 월평균 ${f(m25)}원 → ${f(m26)}원으로 ${f(m26-m25)}원 증가<br>• ${scale} 규모(${sites}개 사이트), 사이트당 1Q 매출 ${f(eff)}원`});
      if(pm>80000) msgs.push({bot:'prismo',badge:'agree',text:`사이트당 월 ${f(pm)}원이면 효율이 좋은 편입니다. 이 성장세에서 <strong>가격을 올릴 여지</strong>가 있어요. 특히 주말 피크 시즌에 10~15% 인상을 테스트해볼 만합니다.`});
      else msgs.push({bot:'prismo',text:`성장 중이지만 사이트당 월 ${f(pm)}원은 아직 여유가 있습니다. <strong>공실을 줄이는 게 먼저</strong>예요. 성장이 '가동률 상승'인지 '단가 상승'인지 구분해야 합니다.`});
    }else{
      msgs.push({bot:'datapine',text:`<strong>${c.n}</strong>의 매출이 <strong style="color:#f44336">${c.chg}%</strong> 하락했습니다.<br>• 25년 1Q ${f(c.pay25)}원 → 26년 1Q ${f(c.pay26)}원<br>• 월 ${f(m25-m26)}원이 빠진 상황입니다<br>• ${scale} 규모(${sites}개), 사이트당 1Q ${f(eff)}원`});
      if(c.chg<-50) msgs.push({bot:'datapine',badge:'concern',text:`${Math.abs(c.chg)}% 하락은 시장 평균(-15~25%)보다 훨씬 큽니다. 시장 탓만이 아니라 <strong>이 캠핑장 고유의 문제</strong>가 있을 가능성이 높습니다.`});
      if(seasonal>2.5) msgs.push({bot:'prismo',badge:'data',text:`성수기 대비 비수기 매출 비율이 <strong>${seasonal}:1</strong>입니다. 시즌 편차가 큰 구조예요. 비수기 공실 관리가 매출 회복의 핵심입니다.`});
      else if(seasonal>0) msgs.push({bot:'prismo',text:`시즌별 편차(${seasonal}:1)는 보통 수준입니다. 특정 시즌이 아니라 <strong>전반적인 매력도</strong>가 문제일 수 있어요.`});
    }
    if(trend==='상승') msgs.push({bot:'compass',text:`다만 최근 3개월 추이는 <strong>상승세</strong>입니다. 바닥을 찍고 올라오는 중일 수 있어요. 이 흐름을 잡는 게 중요합니다.`});
    else if(trend==='하락'&&!up) msgs.push({bot:'compass',badge:'concern',text:`최근 3개월도 하락 추세입니다. <strong>빠른 개입이 필요합니다.</strong>`});
    msgs.push({bot:'compass',text:`핵심 질문: <strong>"온라인에서 이 캠핑장을 본 캠퍼가, 찾아갈 수밖에 없게 만들어져 있는가?"</strong><br>컨셉 → 리뷰 → 사진 → 설명, 이 4가지를 점검합니다.`});
  }

  else if(roundNum===2){
    // R2: 컨셉 & 리뷰
    if(hasConcept){
      msgs.push({bot:'voxcamp',text:`이 캠핑장의 컨셉: <strong>${concepts.join(', ')}</strong><br><br>컨셉이 있다는 건 큰 강점입니다. 문제는 <strong>"캠퍼가 검색했을 때 이게 바로 보이느냐"</strong>예요.`});
      if(concepts.includes('애견 전용')) msgs.push({bot:'voxcamp',badge:'extend',text:`반려동물 동반 캠핑 수요가 해마다 30%+ 증가하고 있습니다. <strong>'애견', '반려견', '소형견 전용'</strong> 키워드를 캠핏 태그·한줄소개·네이버 플레이스에 모두 넣으세요. 이 키워드 하나로 검색 유입이 확 달라집니다.`});
      if(concepts.includes('키즈/가족')) msgs.push({bot:'voxcamp',badge:'extend',text:`가족 캠핑은 <strong>안전</strong>과 <strong>편의시설</strong>이 핵심이에요. 놀이터, 수영장, 키즈존 사진을 전면에 배치하고, '아이와 함께' 키워드를 강조하세요.`});
      if(concepts.includes('글램핑')||concepts.includes('카라반')) msgs.push({bot:'voxcamp',badge:'extend',text:`${concepts.includes('글램핑')?'글램핑':'카라반'}은 <strong>내부 사진이 전부</strong>입니다. 깨끗한 침구, 에어컨, 바비큐 셋업 — 이 3장만 잘 찍으면 예약률이 올라갑니다.`});
      if(concepts.includes('바다')) msgs.push({bot:'lensfield',badge:'agree',text:`바다 뷰는 <strong>드론 항공샷이 필수</strong>입니다. 해안선+캠핑장 전경을 한 장에 담으면, 그 사진 하나가 6개월을 먹여 살립니다.`});
      if(concepts.includes('계곡/자연')) msgs.push({bot:'lensfield',badge:'agree',text:`계곡/자연 환경은 <strong>시즌별 사진 교체</strong>가 핵심이에요. 봄 신록, 여름 물놀이, 가을 단풍 — 같은 캠핑장이 완전히 다르게 보입니다.`});
    }else{
      msgs.push({bot:'voxcamp',badge:'concern',text:`이 캠핑장의 <strong>명확한 컨셉이 보이지 않습니다.</strong><br><br>캠퍼가 "왜 여기를 가야 하지?"에 3초 안에 답할 수 없으면 넘어갑니다.`});
      if(sites>=30) msgs.push({bot:'voxcamp',text:`${sites}개 사이트 규모면 <strong>"넓은 사이트 간격"</strong>을 차별점으로 내세울 수 있습니다. "옆 사이트가 안 보이는 프라이빗 캠핑"은 강력한 컨셉이에요.`});
      else msgs.push({bot:'voxcamp',text:`${scale} 규모라면 오히려 <strong>"조용하고 아늑한"</strong>을 어필할 수 있습니다. 소규모 캠핑장만의 감성을 컨셉으로 잡으세요.`});
    }
    msgs.push({bot:'voxcamp',text:`<strong>리뷰는 곧 신뢰입니다.</strong><br>• 좋은 리뷰 → 핵심 문구를 프로필에 인용<br>• 별점이 높다면 → 한줄소개에 "⭐ 평점 4.8" 어필<br>• 부족하다면 → 방문객 리뷰 유도 (다음 예약 할인 등)`});
    msgs.push({bot:'datapine',badge:'data',text:`${region} 지역 ${scale} 규모에서 <strong>확실한 한 가지 강점</strong>만으로도 월 예약 5~6건 차이가 납니다.`});
  }

  else if(roundNum===3){
    // R3: 사진 & 온라인 프로필
    msgs.push({bot:'lensfield',text:`사진 점검 포인트:<br><br>✅ 메인 사진이 실사인가? (로고/일러스트 ❌)<br>✅ 드론 항공샷이 있는가? ${sites>=20?'('+sites+'개 사이트면 필수!)':''}<br>✅ 시즌별 사진이 다양한가?<br>✅ 사이트 내부·화장실·편의시설 사진이 있는가?`});
    if(hasConcept&&concepts.includes('애견 전용')) msgs.push({bot:'lensfield',badge:'extend',text:`애견 캠핑장이면 <strong>반려견이 뛰어노는 실제 사진</strong>이 있어야 합니다. 빈 잔디밭보다 강아지가 있는 사진이 전환율 2배예요.`});
    if(hasConcept&&(concepts.includes('글램핑')||concepts.includes('카라반')||concepts.includes('펜션'))) msgs.push({bot:'lensfield',badge:'extend',text:`숙박 유형이라면 <strong>내부 사진 3장이 생명</strong>입니다. ① 전체 구조 ② 침대/침구 클로즈업 ③ 창밖 뷰 — 이 3장만 잘 찍으면 됩니다.`});
    msgs.push({bot:'lensfield',text:`<strong>온라인 설명도 사진만큼 중요합니다.</strong><br><br>• 한줄소개 = 컨셉이 바로 드러나는가?<br>• 사이트별 크기(m²)·간격·뷰 설명이 있는가?<br>• 화장실/샤워실 개수·청결도 언급이 있는가?<br>• 주변 마트·계곡·관광지 거리 정보가 있는가?`});
    if(sites>=15) msgs.push({bot:'prismo',badge:'agree',text:`${sites}개 사이트 규모면 <strong>드론 촬영 1회로 6개월치 소재</strong>가 나옵니다. 가성비 최고의 투자예요.`});
    msgs.push({bot:'compass',text:`캠퍼의 결정 순서: <strong>사진 3초 → 설명 10초 → 리뷰 확인 → 예약</strong><br>이 흐름에서 하나라도 막히면 이탈합니다.`});
  }

  else if(roundNum===4){
    // R4: 가격 전략 — 규모별·상황별 분기
    if(pm>70000) msgs.push({bot:'prismo',text:`사이트당 월 ${f(pm)}원 — <strong>양호한 수준</strong>입니다.<br><br>💡 가격을 더 올릴 수 있는 레버:<br>① 주말 피크 프라이싱 (10~15% 인상)<br>② 프리미엄 사이트 분리 (뷰 좋은 곳 별도 가격)<br>③ 부대 서비스 유료화 (장작·렌탈 등)`});
    else if(pm>30000) msgs.push({bot:'prismo',text:`사이트당 월 ${f(pm)}원 — <strong>개선 여지가 큽니다.</strong><br><br>💡 3가지 레버:<br>① 주중 공실 → 20~30% 할인 (빈 사이트 = 0원짜리 재고)<br>② 주말 피크 → 10~15% 인상<br>③ 시즌 얼리버드 → 2주 전 예약 시 10% 할인`});
    else msgs.push({bot:'prismo',badge:'concern',text:`사이트당 월 ${f(pm)}원은 <strong>심각하게 낮습니다.</strong> 공실이 많다는 뜻이에요.<br><br>💡 긴급 처방:<br>① 즉시 주중 30% 할인 프로모션<br>② "2박 시 1박 50% 할인" 연박 유도<br>③ 번들링 (장작+렌탈 포함 패키지)`});
    msgs.push({bot:'datapine',badge:'data',text:`월 5건 추가 예약 × 평균 6만원 = <strong>월 30만원 추가</strong>. 연 360만원 차이입니다.`});
    if(up) msgs.push({bot:'voxcamp',badge:'agree',text:`성장 중이니까 할인보다 <strong>"가치 올리기"</strong>가 맞습니다. 프리미엄 존을 따로 만들어 가격대를 나누는 것도 방법이에요.`});
    else if(c.chg>-40) msgs.push({bot:'voxcamp',text:`할인할 때 중요한 건 <strong>"싸서 간다" 이미지가 붙으면 안 된다</strong>는 거예요. "기간 한정 특별가" 프레이밍이 필요합니다.`});
    else msgs.push({bot:'voxcamp',badge:'concern',text:`매출이 ${Math.abs(c.chg)}% 빠진 상황에서는 <strong>일단 사람을 채우는 게 우선</strong>입니다. 공격적 프로모션으로 가동률부터 올리세요. 이미지는 나중에 잡을 수 있습니다.`});
  }

  else if(roundNum===5){
    // R5: 실행 플랜 — 상황별 다른 로드맵
    const w1=[],w2=[],w3=[];
    if(up){
      w1.push('캠핏 프로필 재작성 (컨셉 전면 배치)','네이버 플레이스 동기화','주말 피크 프라이싱 설계');
      w2.push('시즌 사진 교체 (여름 준비)','상세 설명 리뉴얼 (사이트별 스펙)','프리미엄 존 기획');
      w3.push('월간 리포트 발행','여름 성수기 프로모션 기획','재방문 유도 알림톡');
    }else if(c.chg>-40){
      w1.push('캠핏 프로필·한줄소개 재작성','네이버 플레이스 최적화','주중 프로모션 설계');
      w2.push(sites>=15?'드론 항공 촬영':'주간 전경 사진 촬영','상세 설명 전면 리뉴얼','가격 조정 루틴 시작');
      w3.push('월간 리포트 발행','여름 성수기 준비','재방문 유도 캠페인');
    }else{
      w1.push('메인 사진 긴급 교체 (실사)','프로필 긴급 재작성 (컨셉 발굴)','즉시 주중 30% 할인 프로모션');
      w2.push('드론 촬영 실시','상세 설명 전면 교체','연박 할인 패키지 출시');
      w3.push('월간 리포트 발행','성수기 프로모션 기획','가격 정상화 로드맵');
    }
    msgs.push({bot:'compass',text:`<strong>3개월 실행 플랜</strong><br><br>📌 <strong>1주차 (즉시)</strong><br>${w1.map(x=>'• '+x).join('<br>')}<br><br>📌 <strong>2~4주차</strong><br>${w2.map(x=>'• '+x).join('<br>')}<br><br>📌 <strong>2~3개월차</strong><br>${w3.map(x=>'• '+x).join('<br>')}`});
    const addPay=Math.round(60000*5.5);
    msgs.push({bot:'datapine',badge:'agree',text:`<strong>예상 효과:</strong> 월 +5~6건 → 월 +${f(addPay)}원 → 분기 +${f(addPay*3)}원`});
    msgs.push({bot:'prismo',badge:'agree',text:`<strong>비용 대비:</strong> 월 20~30만원 투자 → 첫 달부터 본전 가능<br>드론 사진·최적화된 프로필은 <strong>계약 끝나도 남는 자산</strong>입니다.`});
  }
  return msgs;
}

// 프로그레스 연출 + 생성
const ROUND_LABELS=[

window.generateReport=function(){
  const raw=document.getElementById('rgCamp').value.trim();
  if(!raw)return alert('캠핑장명을 입력해주세요.');
  const name=_rgNames.find(n=>n===raw)||_rgNames.find(n=>n.includes(raw));
  if(!name)return alert('해당 캠핑장을 찾을 수 없습니다: '+raw);
  const c=collectCampData(name);
  if(c.pay26===0&&c.pay25===0)return alert('해당 업체의 결제 데이터가 없습니다.');

  const btn=document.getElementById('rgBtn');btn.disabled=true;btn.textContent='분석 중...';
  const prog=document.getElementById('rgProgress');prog.style.display='block';
  const bar=document.getElementById('rgBar');
  const stxt=document.getElementById('rgStatusText');
  const live=document.getElementById('rgLive');live.innerHTML='';
  document.getElementById('rgPreview').innerHTML='';

  const allRounds=[];
  let step=0;

  function nextStep(){
    if(step>=5){
      bar.style.width='100%';
      stxt.textContent='리포트를 조립하고 있습니다...';
      setTimeout(function(){
        const html=assembleReportHTML(c,allRounds);
        const blob=new Blob([html],{type:'text/html;charset=utf-8'});
        const url=URL.createObjectURL(blob);
        window.open(url,'_blank');
        const slug=name.replace(/\s+/g,'-').replace(/[^가-힣a-zA-Z0-9-]/g,'');
        document.getElementById('rgPreview').innerHTML='<div class="panel" style="margin-top:16px"><h3><span class="icon" style="background:var(--green)"></span>분석 완료: '+name+'</h3><p style="color:var(--text2);font-size:13px;margin-bottom:12px">5라운드 분석이 완료되었습니다. 새 탭에서 열렸습니다.</p><a href="'+url+'" download="report-'+slug+'-'+new Date().toISOString().split('T')[0]+'.html" class="btn btn-primary">HTML 다운로드</a></div>';
        stxt.textContent='완료!';
        document.getElementById('rgSpinner').style.animation='none';
        btn.disabled=false;btn.textContent='AI 분석 리포트 생성';
      },600);
      return;
    }
    const rd=ROUND_LABELS[step];
    bar.style.width=(step/5*100)+'%';
    stxt.textContent='R'+(step+1)+'/5 — '+rd.lead+'이(가) '+rd.status+'...';

    setTimeout(function(){
      const msgs=smartRound(c,step+1);
      allRounds.push(msgs);
      let preview='<div style="margin-top:12px"><div style="color:var(--accent);font-size:12px;font-family:monospace;margin-bottom:8px">R'+(step+1)+' — '+rd.title+' ✓</div>';
      msgs.forEach(function(m){
        var b=REPORT_BOTS.find(function(x){return x.id===m.bot})||REPORT_BOTS[4];
        preview+='<div style="display:flex;gap:8px;margin:6px 0;font-size:12px"><span>'+b.emoji+'</span><span style="color:'+b.color+';font-weight:600">'+b.label+'</span><span style="color:var(--text2)">'+((m.text||'').replace(/<[^>]+>/g,' ')).substring(0,100)+'...</span></div>';
      });
      preview+='</div>';
      live.innerHTML+=preview;
      bar.style.width=((step+1)/5*100)+'%';
      step++;
      setTimeout(nextStep,800+Math.random()*600);
    },1200+Math.random()*800);
  }
  nextStep();
};

window.handleSettleUpload=function(file){
  if(!file)return;
  const result=document.getElementById('mainUploadResult');
  result.innerHTML='<span style="color:var(--accent);font-size:12px">읽는 중...</span>';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      // 컬럼: 0=정산차수, 10=정산건수, 11=결제금액, 13=환불금액, 26=정산지급금액, 30=캠핑장명, 31=플랜, 32=MD명, 33=정산일
      if(rows.length<=1){
        result.innerHTML='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px"><span style="color:var(--orange);font-weight:700">⚠</span> <span style="font-size:12px">데이터가 없는 파일입니다 (헤더만 존재). 다른 파일을 업로드해주세요.</span></div>';
        return;
      }
      const settlements=csLoad();
      let total=0, newCount=0, period='', campSet=new Set();
      for(let i=1;i<rows.length;i++){
        const row=rows[i];
        if(!row||!row[0])continue;
        total++;
        if(!period)period=String(row[0]);
        const campName=String(row[30]||'').trim();
        if(!campName)continue;
        campSet.add(campName);
        const pay=parseInt(row[11])||0;
        const refund=parseInt(row[13])||0;
        const settle=parseInt(row[26])||0;
        const cnt=parseInt(row[10])||0;
        const settleDate=String(row[33]||'');
        const mdName=String(row[32]||'');
        const planName=String(row[31]||'');

        if(!settlements[campName])settlements[campName]=[];
        const key=String(row[0])+'_'+String(row[1]);
        if(!settlements[campName].find(s=>s.key===key)){
          settlements[campName].push({key,period:String(row[0]),date:settleDate,pay,refund,settle,cnt,md:mdName,plan:planName});
          newCount++;
        }
      }
      csSave(settlements);
      localStorage.setItem('settle_last_upload',period);

      result.innerHTML='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px"><span style="color:var(--green);font-weight:700">✓</span> <strong style="font-size:12px">'+period+'</strong><br><span style="font-size:11px;color:var(--text2)">'+total+'건 · '+campSet.size+'개 업체 · 신규 '+newCount+'건</span></div>';
    }catch(err){
      result.innerHTML='<span style="color:var(--red);font-size:12px">오류: '+err.message+'</span>';
    }
  };
  reader.readAsArrayBuffer(file);
};

function renderClientMgmt(){
  const clients=cmLoad();

  const total=clients.length;
  const lightC=clients.filter(c=>c.tier==='light').length;
  const stdC=clients.filter(c=>c.tier==='standard').length;
  const monthlyRev=lightC*220000+stdC*330000;
  const avgProgress=total>0?Math.round(clients.reduce((s,c)=>{const t=c.tasks;const done=Object.values(t).filter(Boolean).length;return s+done/Object.keys(t).length*100},0)/total):0;

  document.getElementById('cmKpi').innerHTML=`
    <div class="kpi"><div class="label">활성 고객</div><div class="value">${total}개</div><div class="change"><span class="tag tag-green">${lightC} Light</span> <span class="tag tag-purple">${stdC} Std</span></div></div>

  const STD_TASKS=['profileOpt','naverSync','droneShoot','descRewrite','promo','reportSent','pricingRoutine','seasonPhoto'];

    const taskKeys=cl.tier==='standard'?STD_TASKS:LIGHT_TASKS;

        <div style="flex:1;min-width:200px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

        <div style="flex:1;min-width:200px">

          ${notesHtml}

  if(!clients.length) html='<div class="panel" style="text-align:center;color:var(--text2);padding:40px">등록된 활성 고객이 없습니다. 위에서 캠핑장을 추가하세요.</div>';

  document.getElementById('cmList').innerHTML=html;
}

async function loadNewsletters(forceRefresh){
  const container=document.getElementById('newsletterContent');
  if(!container)return;
  const btn=document.getElementById('newsletterRefreshBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ 불러오는 중...';}
  // GitHub raw 우선 (camping-newsletter 레포에서 매주 월요일 자동 갱신)
  // 실패 시 로컬(data/newsletter/) 폴백
  const BASES=[
    'https://raw.githubusercontent.com/qwaszx030849-creator/camping-newsletter/main/output/',
    'data/newsletter/'
  ];
  const now=new Date();
  const newsletters=[];
  const cacheBust=forceRefresh?`?t=${Date.now()}`:'';
  // 최근 3개월치 뉴스레터 JSON 시도 (로컬 우선, Vercel 폴백)
  for(let mOff=0;mOff<3;mOff++){
    const d=new Date(now.getFullYear(),now.getMonth()-mOff,1);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0');
    for(let w=5;w>=1;w--){
      const fname=`newsletter_${y}_${m}_week${w}.json`;
      let loaded=false;
      for(const base of BASES){
        try{
          const res=await fetch(`${base}${fname}${cacheBust}`);
          if(res.ok){const data=await res.json();newsletters.push(data);loaded=true;break;}
        }catch(e){}
      }
    }
  }
  if(btn){btn.disabled=false;btn.textContent='🔄 최신화';}
  const updateEl=document.getElementById('newsletterLastUpdate');
  if(updateEl){
    const t=new Date();
    updateEl.textContent=`마지막 갱신: ${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  }
  if(!newsletters.length){
    container.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2)">뉴스레터 데이터를 불러올 수 없습니다.<br><a href="https://camping-newsletter.vercel.app/" target="_blank" style="color:var(--accent)">아카이브에서 직접 확인하기</a></div>';
    return;
  }
  window._nlCache=newsletters;
  container.innerHTML=newsletters.map((nl,idx)=>`
    <div class="panel" style="cursor:default">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0"><span class="icon" style="background:var(--green)"></span>${nl.week_info?.display||nl.title}</h3>
        <span class="tag tag-green">${nl.items_count||nl.items?.length||0}개 소식</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${(nl.items||[]).slice(0,5).map((item,i)=>`
          <div style="display:flex;gap:12px;align-items:flex-start;padding:8px 12px;background:var(--card2);border-radius:8px">
            <span style="color:var(--accent);font-weight:700;min-width:20px">${i+1}</span>
            <div style="flex:1;min-width:0">
              <a href="${item.url}" target="_blank" style="color:var(--text);text-decoration:none;font-size:14px;font-weight:500;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.title}</a>
              ${item.description?`<p style="color:var(--text2);font-size:12px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.description.slice(0,60)}...</p>`:''}
            </div>
            <span class="tag tag-blue" style="flex-shrink:0">${item.category||item.source||''}</span>
          </div>
        `).join('')}
        ${(nl.items||[]).length>5?`<div style="text-align:center;color:var(--text2);font-size:12px;padding:4px">외 ${nl.items.length-5}건 더보기 →</div>`:''}
      </div>
      <div style="margin-top:12px;text-align:right">
        <a href="#" onclick="openNewsletterDetail(${idx});return false" style="color:var(--accent);font-size:13px;text-decoration:none">상세 보기 →</a>
      </div>
    </div>
  `).join('');
}

function openNewsletterDetail(idx){
  const nl=window._nlCache[idx];
  if(!nl)return;
  const overlay=document.createElement('div');
  overlay.id='nlDetailOverlay';
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:9999;display:flex;justify-content:center;align-items:center;padding:20px';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  overlay.innerHTML=`
    <div style="background:var(--card);border-radius:16px;padding:28px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;border:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div>
          <h2 style="font-size:20px;font-weight:700;margin:0">${nl.week_info?.display||nl.title}</h2>
          <p style="color:var(--text2);font-size:12px;margin-top:4px">${nl.created_at?new Date(nl.created_at).toLocaleDateString('ko-KR'):''} | ${nl.items_count||nl.items?.length||0}개 소식</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button onclick="copyNewsletterForKakao(${idx})" id="nlKakaoBtn" class="btn" style="background:var(--orange);color:#fff;font-size:12px;padding:6px 14px">📱 카톡 복사</button>
          <button onclick="document.getElementById('nlDetailOverlay').remove()" style="background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:4px 8px">✕</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${(nl.items||[]).map((item,i)=>`
          <div style="padding:14px 16px;background:var(--card2);border-radius:10px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="color:var(--accent);font-weight:700;font-size:16px">${i+1}</span>
                <span class="tag tag-blue">${item.category||item.source||''}</span>
              </div>
              ${item.published_date?`<span style="color:var(--text2);font-size:11px;white-space:nowrap">${new Date(item.published_date).toLocaleDateString('ko-KR')}</span>`:''}
            </div>
            <a href="${item.url}" target="_blank" style="color:var(--text);text-decoration:none;font-size:15px;font-weight:600;line-height:1.4;display:block;margin-bottom:6px">${item.title}</a>
            ${item.summary?`<p style="color:var(--text2);font-size:13px;line-height:1.6;margin:0">${item.summary}</p>`:item.description?`<p style="color:var(--text2);font-size:13px;line-height:1.6;margin:0">${item.description}</p>`:''}
            <div style="margin-top:8px"><a href="${item.url}" target="_blank" style="color:var(--accent);font-size:12px;text-decoration:none">원문 보기 →</a></div>
          </div>
        `).join('')}
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function copyNewsletterForKakao(idx){
  const nl=window._nlCache[idx];
  if(!nl)return;
  const lines=[];
  lines.push(`🏕️ 캠핑장 운영 뉴스레터`);
  lines.push(`📅 ${nl.week_info?.display||nl.title}`);
  lines.push('');
  lines.push('ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ');
  lines.push('');
  (nl.items||[]).forEach((item,i)=>{
    lines.push(`📌 ${i+1}. ${item.title}`);
    lines.push('');
    const desc=item.summary||item.description;
    if(desc){lines.push(`💬 ${desc}`);lines.push('');}
    lines.push(`🔗 ${item.url}`);
    lines.push('');
    lines.push('ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ');
    lines.push('');
  });
  lines.push('');
  lines.push('💡 매주 월요일 발송');
  const text=lines.join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('nlKakaoBtn');
    if(btn){btn.textContent='✅ 복사 완료!';btn.style.background='var(--green)';setTimeout(()=>{btn.textContent='📱 카톡 복사';btn.style.background='var(--orange)';},2000);}
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
    const btn=document.getElementById('nlKakaoBtn');
    if(btn){btn.textContent='✅ 복사 완료!';btn.style.background='var(--green)';setTimeout(()=>{btn.textContent='📱 카톡 복사';btn.style.background='var(--orange)';},2000);}
  });
}

function initCampList(){
  const plans=new Set();D.camps.forEach(c=>{if(c.p)plans.add(c.p)});
  const sel=document.getElementById('campPlan');
  Array.from(plans).sort().forEach(p=>{sel.innerHTML+=`<option value="${p}">${p}</option>`});
  renderCampList();
}
function renderCampList(){
  const search=(document.getElementById('campSearch').value||'').toLowerCase();
  const status=document.getElementById('campStatus').value;
  const plan=document.getElementById('campPlan').value;
  let data=activeCamps();
  if(search)data=data.filter(c=>(c.n+c.a+c.p).toLowerCase().includes(search));
  if(status)data=data.filter(c=>c.s===status);
  if(plan)data=data.filter(c=>c.p===plan);
  document.getElementById('campCount').textContent=`${data.length}개 거래처`;
  // add region field for sorting
  data.forEach(c=>{c.region=(c.a||'').split(' ').slice(0,2).join(' ')});
  const campRowFn=c=>{
    const esc=c.n.replace(/'/g,"\\'");
    return `<tr><td><strong>${c.n}</strong></td><td><span class="tag ${c.s==='운영중'?'tag-green':'tag-orange'}">${c.s}</span></td><td><span class="tag ${c.r==='등록완료'?'tag-green':'tag-orange'}">${c.r}</span></td><td>${c.p||'-'}</td><td><span class="tag tag-purple">${c.mp||'-'}</span></td><td>${c.region}</td><td>${c.z||0}</td><td>${c.rv||0}</td><td>${c.ex||0}</td><td>${c.fv||0}</td><td>${c.bt||'-'}</td><td>${c.l?'<a class="camp-link" href="'+c.l+'" target="_blank">보기</a>':'-'}</td><td><button class="btn-del" onclick="if(confirm('${esc} 을(를) 숨김 처리하시겠습니까?'))hideCamp('${esc}')">삭제</button></td></tr>`;
  };
  makeSortable('campTable',data,campRowFn,'n','asc');
}
// 미운영/이탈 일괄 숨김
window.hideAllInactive=function(){
  const inactive=activeCamps().filter(c=>c.s==='미운영');
  if(!inactive.length)return alert('미운영 업체가 없습니다.');
  if(!confirm(inactive.length+'개 미운영 업체를 일괄 숨김 처리하시겠습니까?'))return;
  const h=getHidden();
  inactive.forEach(c=>{if(!h.includes(c.n))h.push(c.n)});
  setHidden(h);refreshAfterHide();
};
window.hideAllChurned=function(){
  const y26names=new Set(yearlyBycamp(2026).map(r=>r.n));
  const churned=activeCamps().filter(c=>c.s==='운영중'&&!y26names.has(c.n));
  if(!churned.length)return alert('이탈 업체가 없습니다.');
  if(!confirm(churned.length+'개 이탈(2026 거래없음) 업체를 일괄 숨김 처리하시겠습니까?'))return;
  const h=getHidden();
  churned.forEach(c=>{if(!h.includes(c.n))h.push(c.n)});
  setHidden(h);refreshAfterHide();
};

document.getElementById('totalCamps').textContent=activeCamps().length;
renderTab('overview');
</script>
